<!doctype html>
<html>
  <head>
    <style>
      @font-face {
        font-family: 'OutfitVar';
        src: url('../../node_modules/@fontsource-variable/outfit/files/outfit-latin-wght-normal.woff2')
          format('woff2-variations');
        font-weight: 100 900;
      }
      html,
      body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        background: transparent;
        overflow: hidden;
      }
      /* mac variant: Apple grid — 824px shape centered in 1024 canvas */
      .shape {
        position: absolute;
        top: 100px;
        left: 100px;
        width: 824px;
        height: 824px;
        border-radius: 186px;
        background: #000;
        box-shadow: inset 0 0 0 6px #2e2e2e;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body.win .shape {
        top: 24px;
        left: 24px;
        width: 976px;
        height: 976px;
        border-radius: 220px;
      }
      .mark {
        font-family: 'OutfitVar';
        font-weight: 800;
        font-size: 560px;
        line-height: 1;
        letter-spacing: -0.02em;
        color: #fff;
        transform: translateY(-40px);
      }
      .mark .dot {
        color: #e63946;
      }
    </style>
  </head>
  <body>
    <div class="shape"><span class="mark">r<span class="dot">.</span></span></div>
  </body>
</html>
