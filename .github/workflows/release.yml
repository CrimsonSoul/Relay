name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get Electron version
        id: electron-version
        run: |
          ELECTRON_VER=$(node -p "require('./package-lock.json').packages['node_modules/electron'].version")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: electron-linux-x64-${{ steps.electron-version.outputs.version }}

      - name: Install dependencies
        env:
          RELAY_SKIP_POCKETBASE_DOWNLOAD: '1'
        run: npm ci --prefer-offline

      - name: Type check
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

  package-windows:
    runs-on: windows-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get Electron version
        id: electron-version
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('./package-lock.json').packages['node_modules/electron'].version")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/electron/Cache
            .electron
          key: electron-win-x64-${{ steps.electron-version.outputs.version }}

      - name: Install dependencies
        env:
          RELAY_SKIP_POCKETBASE_DOWNLOAD: '1'
        run: npm ci --prefer-offline

      - name: Download PocketBase binary
        run: node scripts/download-pocketbase.mjs --platform=win32 --arch=x64

      - name: Verify PocketBase binary exists
        shell: bash
        run: |
          if [ -f "resources/pocketbase/win32-x64/pocketbase.exe" ]; then
            echo "PocketBase binary found"
            ls -la resources/pocketbase/win32-x64/
          else
            echo "ERROR: PocketBase binary not found!"
            ls -la resources/pocketbase/ 2>/dev/null || echo "resources/pocketbase/ does not exist"
            exit 1
          fi

      - name: Build and package
        run: npm run package:win

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: relay-windows
          path: release/*.exe

  release:
    needs: [quality, package-windows]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        uses: actions/github-script@v8
        with:
          script: |
            const version = require('./package.json').version;
            core.setOutput('tag', `v${version}`);
            core.setOutput('name', `Release v${version}`);

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: relay-windows
          path: release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: 'Automated release from workflow dispatch.'
          files: |
            release/Relay.exe
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
