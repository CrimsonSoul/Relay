name: Build and Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - pb
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get Electron version
        id: electron-version
        run: |
          ELECTRON_VER=$(node -p "require('./package-lock.json').packages['node_modules/electron'].version")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: electron-linux-x64-${{ steps.electron-version.outputs.version }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  package-windows:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pb'))
    runs-on: windows-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get Electron version
        id: electron-version
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('./package-lock.json').packages['node_modules/electron'].version")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/electron/Cache
            .electron
          key: electron-win-x64-${{ steps.electron-version.outputs.version }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Download PocketBase binary
        run: npx tsx scripts/download-pocketbase.ts

      - name: Verify PocketBase binary exists
        shell: bash
        run: |
          if [ -f "resources/pocketbase/pocketbase.exe" ]; then
            echo "PocketBase binary found"
            ls -la resources/pocketbase/
          else
            echo "ERROR: PocketBase binary not found!"
            ls -la resources/pocketbase/ 2>/dev/null || echo "resources/pocketbase/ does not exist"
            exit 1
          fi

      - name: Build and package
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: relay-windows
          path: release/*.exe

  package-macos:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pb'))
    runs-on: macos-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get Electron version
        id: electron-version
        run: |
          ELECTRON_VER=$(node -p "require('./package-lock.json').packages['node_modules/electron'].version")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            .electron
          key: electron-mac-${{ runner.arch }}-${{ steps.electron-version.outputs.version }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Download PocketBase binary
        run: npx tsx scripts/download-pocketbase.ts

      - name: Verify PocketBase binary exists
        run: |
          if [ -f "resources/pocketbase/pocketbase" ]; then
            echo "PocketBase binary found"
            ls -la resources/pocketbase/
          else
            echo "ERROR: PocketBase binary not found!"
            ls -la resources/pocketbase/ 2>/dev/null || echo "resources/pocketbase/ does not exist"
            exit 1
          fi

      - name: Build and package
        run: npm run build:mac

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: relay-macos
          path: release/*.dmg
