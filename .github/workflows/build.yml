name: Build and Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get Electron version
        id: electron-version
        run: |
          ELECTRON_VER=$(node -p "require('./package-lock.json').packages['node_modules/electron'].version")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: electron-linux-x64-${{ steps.electron-version.outputs.version }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  package-windows:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: windows-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Get Electron version
        id: electron-version
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('./package-lock.json').packages['node_modules/electron'].version")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/electron/Cache
            .electron
          key: electron-win-x64-${{ steps.electron-version.outputs.version }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build and package
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: relay-windows
          path: release/*.exe
