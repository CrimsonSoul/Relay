<!-- Relay app icon source (macOS variant — Apple grid: 824px shape in 1024 canvas).
     The wordmark "r." requires the Outfit font; the shipped icon.icns/icon.ico are
     rendered from this design via scripts/icon/render.cjs (Electron capture with the
     bundled @fontsource Outfit), then assembled with iconutil / png2icons. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="100" y="100" width="824" height="824" rx="186" fill="#000000"/>
  <rect x="103" y="103" width="818" height="818" rx="183" stroke="#2e2e2e" stroke-width="6" fill="none"/>
  <text x="472" y="672" text-anchor="middle" font-family="Outfit, 'Outfit Variable', sans-serif"
    font-weight="800" font-size="560" letter-spacing="-0.02em" fill="#ffffff">r<tspan fill="#e63946">.</tspan></text>
</svg>
