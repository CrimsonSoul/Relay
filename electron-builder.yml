appId: com.operators.relay
productName: 'Relay'
asar: true
electronFuses:
  runAsNode: false
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  # enableEmbeddedAsarIntegrityValidation intentionally OFF: electron-builder signs
  # the unpacked native modules (better-sqlite3) after computing asar integrity
  # hashes, so the fuse trips at startup ("ASAR Integrity Violation") on every
  # signed build. Re-enable once builder computes integrity post-signing.
  enableEmbeddedAsarIntegrityValidation: false
  onlyLoadAppFromAsar: true
  resetAdHocDarwinSignature: true
electronLanguages:
  - en-US
files:
  - dist/**
  - package.json
  - resources/**
  - '!node_modules/fsevents/**'
  - '!**/*.{md,ts,map,log}'
  - '!**/LICENSE'
  - '!**/.{git,github,vscode,idea}'
  - '!**/tsconfig*.json'
  - '!**/.eslintrc*'
  - '!**/.prettierrc*'
  - '!**/*.{test,spec}.{js,jsx,ts,tsx}'
  - '!**/tests/**'
  - '!**/test-results/**'
  - '!**/playwright*'
  - '!**/vitest*'
directories:
  output: release
  buildResources: resources
npmRebuild: true
removePackageScripts: true
extraResources:
  - from: resources
    to: data
    filter:
      - '**/*'
      - '!pocketbase/**'
  - from: 'resources/pocketbase/'
    to: 'pocketbase/'
    filter:
      - '**/*'
win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: 'Relay.exe'
  icon: build/icon.ico
  requestedExecutionLevel: 'asInvoker'
compression: 'maximum'
electronDownload:
  cache: '.electron'

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: 'Relay-${arch}.dmg'
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: true
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
